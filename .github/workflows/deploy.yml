name: TalentIQ CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  # Backend: Render Auto-Deploys on Push (Webhook-based CI/CD)
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Trigger Render Deploy
      run: |
        echo "✅ Render is configured for auto-deploy on push."
        echo "Backend will automatically rebuild at: https://dashboard.render.com"
        echo "Environment variables (HUGGINGFACE_API_TOKEN, HF_TOKEN, HF_MODEL, SUPABASE_URL, SUPABASE_KEY) are securely managed in Render Dashboard."

  # Frontend: Vercel Auto-Deploys on Push
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest
    steps:
    - name: Verify Vercel Deployment
      run: |
        echo "✅ Vercel is configured for auto-deploy on push."
        echo "Frontend will automatically rebuild at: https://vercel.com/dashboard"
        echo "Environment variable VITE_API_BASE_URL points to the live Render backend URL."
